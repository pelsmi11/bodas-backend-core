spring:
  application:
    name: bodas-backend-core

  # Dynamic Database Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      credentials:
        profile:
          name: ${AWS_PROFILE}
      s3:
        region: ${AWS_REGION}
      secretsmanager:
        enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}

  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}

app:
  redis:
    listener:
      enabled: true
  s3:
    bucket-name: ${S3_BUCKET_NAME}
  webhook:
    secret: ${WEBHOOK_SECRET}
  secrets:
    moderation-name: ${MODERATION_SECRET_NAME}

# Swagger / OpenAPI disabled by default; enabled in dev profile (application-dev.yml)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
